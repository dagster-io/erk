[project]
name = "erk-slots"
version = "0.9.11"
description = "Worktree pool slot management for erk"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "erk-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/erk_slots"]
