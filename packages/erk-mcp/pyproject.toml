[project]
name = "erk-mcp"
version = "0.1.0"
description = "FastMCP server exposing erk capabilities as MCP tools"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
]

[project.scripts]
erk-mcp = "erk_mcp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/erk_mcp"]
