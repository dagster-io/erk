name: one-shot
run-name: "one-shot${{ inputs.plan_only && '(plan)' || '' }}:#${{ inputs.pr_number }}:${{ inputs.distinct_id }}"

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Task description for autonomous execution"
        required: true
        type: string
      branch_name:
        description: "Branch to work on (created by CLI command)"
        required: true
        type: string
      pr_number:
        description: "Draft PR number (created by CLI command)"
        required: true
        type: string
      submitted_by:
        description: "GitHub username of the person who submitted"
        required: true
        type: string
      distinct_id:
        description: "Unique identifier for run discovery (base36)"
        required: true
        type: string
      model_name:
        description: "Claude model to use for execution"
        required: false
        type: string
        default: "claude-opus-4-6"
      objective_issue:
        description: "Objective issue number (when dispatched from implement --one-shot)"
        required: false
        type: string
        default: ""
      node_id:
        description: "Roadmap node ID (when dispatched from implement --one-shot)"
        required: false
        type: string
        default: ""
      plan_issue_number:
        description: "Plan entity number: issue number (github backend) or PR number (planned_pr backend)"
        required: false
        type: string
        default: ""
      plan_backend:
        description: "Plan backend type (github or planned_pr)"
        required: false
        type: string
        default: "github"
      plan_only:
        description: "If true, only run the plan phase, skip implementation"
        required: false
        type: boolean
        default: false

concurrency:
  group: one-shot-${{ inputs.branch_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  plan:
    if: vars.CLAUDE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      plan_id: ${{ steps.read_result.outputs.plan_id }}
      plan_title: ${{ steps.read_result.outputs.plan_title }}
      base_branch: ${{ steps.trunk.outputs.trunk_branch }}
    steps:
      - name: Validate required secrets
        env:
          ERK_PAT: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          if [ -z "$ERK_PAT" ]; then
            echo "::error title=Missing Secret::ERK_QUEUE_GH_PAT secret is not configured or has expired. Add a PAT with 'repo' scope at: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
          fetch-depth: 0

      - uses: ./.github/actions/erk-remote-setup
        with:
          erk-pat: ${{ secrets.ERK_QUEUE_GH_PAT }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Checkout implementation branch
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
          SUBMITTED_BY: ${{ inputs.submitted_by }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git config user.name "$SUBMITTED_BY"
          git config user.email "$SUBMITTED_BY@users.noreply.github.com"

      - name: Write prompt to .erk/impl-context/prompt.md
        env:
          PROMPT: ${{ inputs.prompt }}
        run: |
          if [ -f .erk/impl-context/prompt.md ]; then
            echo "Prompt already committed to .erk/impl-context/prompt.md"
          else
            mkdir -p .erk/impl-context
            printf '%s\n' "$PROMPT" > .erk/impl-context/prompt.md
            echo "Prompt written to .erk/impl-context/prompt.md from workflow input"
          fi

      - name: Detect trunk branch
        id: trunk
        run: |
          result=$(erk exec detect-trunk-branch)
          echo "trunk_branch=$(echo "$result" | jq -r '.trunk_branch')" >> $GITHUB_OUTPUT

      - name: Update lifecycle stage to planning
        if: inputs.plan_issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PLAN_ISSUE_NUMBER: ${{ inputs.plan_issue_number }}
        run: |
          erk exec update-plan-header "$PLAN_ISSUE_NUMBER" lifecycle_stage=planning

      - name: Run one-shot planning
        id: plan
        run: |
          set +e
          claude --print \
            --model ${{ inputs.model_name }} \
            --output-format stream-json \
            --dangerously-skip-permissions \
            --verbose \
            "@.claude/commands/erk/system/one-shot-plan.md $PLAN_ISSUE_NUMBER"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 0 ]; then
            echo "plan_success=true" >> $GITHUB_OUTPUT
          else
            echo "plan_success=false" >> $GITHUB_OUTPUT
          fi
          exit 0
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OBJECTIVE_ISSUE: ${{ inputs.objective_issue }}
          NODE_ID: ${{ inputs.node_id }}
          PLAN_ISSUE_NUMBER: ${{ inputs.plan_issue_number }}

      - name: Verify plan outputs exist
        if: steps.plan.outputs.plan_success == 'true'
        id: verify
        run: |
          if [ -f .erk/impl-context/plan-result.json ]; then
            REJECTED=$(jq -r '.rejected // false' .erk/impl-context/plan-result.json)
            if [ "$REJECTED" = "true" ]; then
              REASON=$(jq -r '.reason // "No reason provided"' .erk/impl-context/plan-result.json)
              echo "::warning::Plan rejected: $REASON"
              echo "rejected=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          if [ ! -f .erk/impl-context/plan.md ]; then
            echo "::error::Planning succeeded but .erk/impl-context/plan.md not found"
            exit 1
          fi
          if [ ! -f .erk/impl-context/plan-result.json ]; then
            echo "::error::Planning succeeded but .erk/impl-context/plan-result.json not found"
            exit 1
          fi
          echo "Plan outputs found"
          echo "rejected=false" >> $GITHUB_OUTPUT

      - name: Update plan on rejection
        if: steps.verify.outputs.rejected == 'true' && inputs.plan_issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PLAN_ISSUE_NUMBER: ${{ inputs.plan_issue_number }}
        run: |
          REASON=$(jq -r '.reason // "Invalid prompt"' .erk/impl-context/plan-result.json)
          gh issue close "$PLAN_ISSUE_NUMBER" --comment "Plan rejected by planning agent: $REASON"

      - name: Read plan result
        id: read_result
        if: steps.plan.outputs.plan_success == 'true' && steps.verify.outputs.rejected != 'true'
        run: |
          PLAN_ID=$(jq -r '.plan_number' .erk/impl-context/plan-result.json)
          PLAN_TITLE=$(jq -r '.title' .erk/impl-context/plan-result.json)
          echo "plan_id=$PLAN_ID" >> $GITHUB_OUTPUT
          echo "plan_title=$PLAN_TITLE" >> $GITHUB_OUTPUT
          echo "Plan saved as #$PLAN_ID: $PLAN_TITLE"

      - name: Validate plan format
        if: >
          steps.plan.outputs.plan_success == 'true'
          && steps.verify.outputs.rejected != 'true'
          && steps.read_result.outputs.plan_id != ''
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          erk pr check ${{ steps.read_result.outputs.plan_id }}

      - name: Register one-shot plan with issue and PR
        if: >
          steps.plan.outputs.plan_success == 'true'
          && steps.verify.outputs.rejected != 'true'
          && steps.read_result.outputs.plan_id != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          erk exec register-one-shot-plan \
            --pr-number "${{ steps.read_result.outputs.plan_id }}" \
            --run-id "${{ github.run_id }}" \
            --impl-pr-number "${{ inputs.pr_number }}" \
            --submitted-by "${{ inputs.submitted_by }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Update objective roadmap node
        if: >
          steps.plan.outputs.plan_success == 'true'
          && steps.verify.outputs.rejected != 'true'
          && steps.read_result.outputs.plan_id != ''
          && inputs.objective_issue != ''
          && inputs.node_id != ''
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          OBJECTIVE_ISSUE: ${{ inputs.objective_issue }}
          NODE_ID: ${{ inputs.node_id }}
          PLAN_NUMBER: ${{ steps.read_result.outputs.plan_id }}
        run: |
          erk exec update-objective-node \
            "$OBJECTIVE_ISSUE" \
            --node "$NODE_ID" \
            --pr "$PLAN_NUMBER"

      - name: Commit plan to branch (plan-only mode)
        if: >
          inputs.plan_only
          && steps.plan.outputs.plan_success == 'true'
          && steps.verify.outputs.rejected != 'true'
          && steps.read_result.outputs.plan_id != ''
        env:
          PLAN_ID: ${{ steps.read_result.outputs.plan_id }}
          PLAN_TITLE: ${{ steps.read_result.outputs.plan_title }}
        run: |
          # Plan is already in .erk/impl-context/plan.md (written directly by Claude)
          mkdir -p .erk/impl-context

          # Create ref.json with plan metadata
          jq -n \
            --arg provider "github" \
            --arg plan_id "$PLAN_ID" \
            --arg title "$PLAN_TITLE" \
            '{provider: $provider, plan_id: $plan_id, title: $title}' \
            > .erk/impl-context/ref.json

          # Remove prompt files from the branch (they served their purpose)
          if git ls-files --error-unmatch .erk/impl-context/prompt.md >/dev/null 2>&1; then
            git rm -f .erk/impl-context/prompt.md
          fi
          if git ls-files --error-unmatch .worker-impl/prompt.md >/dev/null 2>&1; then
            git rm -rf .worker-impl/
          fi

          # Stage and commit
          git add -f .erk/impl-context/
          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "Add plan for PR #$PLAN_ID"
            git push origin "$(git branch --show-current)"
            echo "Committed plan for #$PLAN_ID to branch"
          else
            echo "No changes to commit"
          fi

      - name: Fail workflow if planning failed
        if: steps.plan.outputs.plan_success != 'true'
        run: |
          echo "One-shot planning failed with exit code: ${{ steps.plan.outputs.exit_code }}"
          exit 1

  implement:
    needs: plan
    if: needs.plan.outputs.plan_id != '' && !inputs.plan_only
    uses: ./.github/workflows/plan-implement.yml
    with:
      plan_id: ${{ needs.plan.outputs.plan_id }}
      plan_title: ${{ needs.plan.outputs.plan_title }}
      submitted_by: ${{ inputs.submitted_by }}
      distinct_id: ${{ inputs.distinct_id }}
      branch_name: ${{ inputs.branch_name }}
      pr_number: ${{ inputs.pr_number }}
      model_name: ${{ inputs.model_name }}
      base_branch: ${{ needs.plan.outputs.base_branch }}
      plan_backend: ${{ inputs.plan_backend }}
    secrets: inherit
