name: code-reviews

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: code-reviews-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    if: vars.CLAUDE_ENABLED != 'false' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_reviews: ${{ steps.discover.outputs.has_reviews }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check local review marker
        id: check-local-review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MARKER="<!-- erk:local-review-passed:${HEAD_SHA} -->"
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q .body)
          if printf '%s' "$PR_BODY" | grep -qF "$MARKER"; then
            echo "Local review marker found for HEAD ${HEAD_SHA:0:8} - skipping CI reviews"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check-local-review.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        if: steps.check-local-review.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install erk
        if: steps.check-local-review.outputs.skip != 'true'
        uses: ./.github/actions/setup-claude-erk

      - name: Discover matching reviews
        if: steps.check-local-review.outputs.skip != 'true'
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUTPUT=$(erk exec discover-reviews --pr-number ${{ github.event.pull_request.number }} --reviews-dir .erk/reviews)
          echo "Discovery output:"
          echo "$OUTPUT"

          SUCCESS=$(echo "$OUTPUT" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Discovery failed"
            echo "$OUTPUT" | jq .
            exit 1
          fi

          MATRIX=$(echo "$OUTPUT" | jq -c '.matrix')
          REVIEW_COUNT=$(echo "$OUTPUT" | jq '.reviews | length')

          echo "Found $REVIEW_COUNT matching reviews"
          echo "Matrix: $MATRIX"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$REVIEW_COUNT" -gt 0 ]; then
            echo "has_reviews=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reviews=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: discover
    if: needs.discover.outputs.has_reviews == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install erk
        uses: ./.github/actions/setup-claude-erk

      - name: Install Claude Code
        uses: ./.github/actions/setup-claude-code

      - name: Run ${{ matrix.name }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW_NAME="${{ matrix.filename }}"
          REVIEW_NAME="${REVIEW_NAME%.md}"

          echo "Running review: $REVIEW_NAME"
          erk exec run-review \
            --name "$REVIEW_NAME" \
            --pr-number ${{ github.event.pull_request.number }} \
            --reviews-dir .erk/reviews
