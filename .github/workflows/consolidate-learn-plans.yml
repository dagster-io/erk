name: consolidate-learn-plans
run-name: "consolidate-learn-plans:#${{ inputs.pr_number }}:${{ inputs.distinct_id }}"

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch to work on (created by CLI command)"
        required: true
        type: string
      pr_number:
        description: "Draft PR number (created by CLI command)"
        required: true
        type: string
      submitted_by:
        description: "GitHub username of the person who submitted"
        required: true
        type: string
      distinct_id:
        description: "Unique identifier for run discovery (base36)"
        required: true
        type: string
      model_name:
        description: "Claude model to use for execution"
        required: false
        type: string
        default: "claude-opus-4-6"

concurrency:
  group: consolidate-learn-plans-${{ inputs.branch_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  consolidate:
    if: vars.CLAUDE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      plan_id: ${{ steps.read_result.outputs.plan_id }}
      plan_title: ${{ steps.read_result.outputs.plan_title }}
      base_branch: ${{ steps.trunk.outputs.trunk_branch }}
      has_plans: ${{ steps.read_result.outputs.has_plans }}
    steps:
      - name: Validate required secrets
        env:
          ERK_PAT: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          if [ -z "$ERK_PAT" ]; then
            echo "::error title=Missing Secret::ERK_QUEUE_GH_PAT secret is not configured or has expired. Add a PAT with 'repo' scope at: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
          fetch-depth: 0

      - uses: ./.github/actions/erk-remote-setup
        with:
          erk-pat: ${{ secrets.ERK_QUEUE_GH_PAT }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Checkout implementation branch
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
          SUBMITTED_BY: ${{ inputs.submitted_by }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git config user.name "$SUBMITTED_BY"
          git config user.email "$SUBMITTED_BY@users.noreply.github.com"

      - name: Write prompt to .erk/impl-context/prompt.md
        run: |
          if [ -f .erk/impl-context/prompt.md ]; then
            echo "Prompt already committed to .erk/impl-context/prompt.md"
          else
            mkdir -p .erk/impl-context
            printf 'Consolidate all open erk-learn plans into a single documentation update.\nRun /erk:consolidate-learn-plans-plan to query, consolidate, and implement.\n' > .erk/impl-context/prompt.md
            echo "Prompt written to .erk/impl-context/prompt.md"
          fi

      - name: Detect trunk branch
        id: trunk
        run: |
          result=$(erk exec detect-trunk-branch)
          echo "trunk_branch=$(echo "$result" | jq -r '.trunk_branch')" >> $GITHUB_OUTPUT

      - name: Run consolidation planning
        id: plan
        run: |
          set +e
          claude --print \
            --model ${{ inputs.model_name }} \
            --output-format stream-json \
            --dangerously-skip-permissions \
            --verbose \
            "/erk:consolidate-learn-plans-plan"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -eq 0 ]; then
            echo "plan_success=true" >> $GITHUB_OUTPUT
          else
            echo "plan_success=false" >> $GITHUB_OUTPUT
          fi
          exit 0
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify plan outputs exist
        if: steps.plan.outputs.plan_success == 'true'
        run: |
          if [ ! -f .erk/impl-context/plan-result.json ]; then
            echo "::error::Planning succeeded but .erk/impl-context/plan-result.json not found"
            exit 1
          fi
          echo "Plan result found"

      - name: Read plan result
        id: read_result
        if: steps.plan.outputs.plan_success == 'true'
        run: |
          HAS_PLANS=$(jq -r '.has_plans' .erk/impl-context/plan-result.json)
          echo "has_plans=$HAS_PLANS" >> $GITHUB_OUTPUT

          if [ "$HAS_PLANS" = "true" ]; then
            PLAN_ID=$(jq -r '.plan_number' .erk/impl-context/plan-result.json)
            PLAN_TITLE=$(jq -r '.title' .erk/impl-context/plan-result.json)
            echo "plan_id=$PLAN_ID" >> $GITHUB_OUTPUT
            echo "plan_title=$PLAN_TITLE" >> $GITHUB_OUTPUT
            echo "Found plans to consolidate: #$PLAN_ID - $PLAN_TITLE"
          else
            echo "No learn plans found to consolidate"
            echo "plan_id=" >> $GITHUB_OUTPUT
            echo "plan_title=" >> $GITHUB_OUTPUT
          fi

      - name: Fail workflow if planning failed
        if: steps.plan.outputs.plan_success != 'true'
        run: |
          echo "Consolidation planning failed with exit code: ${{ steps.plan.outputs.exit_code }}"
          exit 1

  close-empty-pr:
    needs: consolidate
    if: needs.consolidate.outputs.has_plans == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Close empty PR
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT || github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          gh pr close "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --comment "No open learn plans found to consolidate. Closing automatically." \
            --delete-branch

  implement:
    needs: consolidate
    if: needs.consolidate.outputs.has_plans == 'true' && needs.consolidate.outputs.plan_id != ''
    uses: ./.github/workflows/plan-implement.yml
    with:
      plan_id: ${{ needs.consolidate.outputs.plan_id }}
      plan_title: ${{ needs.consolidate.outputs.plan_title }}
      submitted_by: ${{ inputs.submitted_by }}
      distinct_id: ${{ inputs.distinct_id }}
      branch_name: ${{ inputs.branch_name }}
      pr_number: ${{ inputs.pr_number }}
      model_name: ${{ inputs.model_name }}
      base_branch: ${{ needs.consolidate.outputs.base_branch }}
      plan_backend: planned_pr
    secrets: inherit

  ci-address:
    needs: [consolidate, implement]
    if: needs.consolidate.outputs.has_plans == 'true' && needs.implement.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Validate required secrets
        env:
          ERK_PAT: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          if [ -z "$ERK_PAT" ]; then
            echo "::error title=Missing Secret::ERK_QUEUE_GH_PAT not configured"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
          fetch-depth: 0

      - uses: ./.github/actions/erk-remote-setup
        with:
          erk-pat: ${{ secrets.ERK_QUEUE_GH_PAT }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Checkout PR branch
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          SUBMITTED_BY: ${{ inputs.submitted_by }}
        run: |
          gh pr checkout "$PR_NUMBER"
          git config user.name "$SUBMITTED_BY"
          git config user.email "$SUBMITTED_BY@users.noreply.github.com"

      - name: Wait for CI checks
        id: ci_wait
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set +e
          # Wait for CI checks with a timeout (10 minutes)
          timeout 600 gh pr checks "$PR_NUMBER" --watch --fail-level all 2>&1
          CI_EXIT=$?
          if [ $CI_EXIT -eq 0 ]; then
            echo "ci_passed=true" >> $GITHUB_OUTPUT
            echo "CI checks passed"
          else
            echo "ci_passed=false" >> $GITHUB_OUTPUT
            echo "CI checks failed or timed out (exit code: $CI_EXIT)"
          fi
          exit 0

      - name: Address CI failures
        if: steps.ci_wait.outputs.ci_passed == 'false'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          claude --print \
            --model ${{ inputs.model_name }} \
            --output-format stream-json \
            --dangerously-skip-permissions \
            --verbose \
            "/erk:pr-address --pr $PR_NUMBER"

      - name: Push fixes
        if: steps.ci_wait.outputs.ci_passed == 'false'
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git add -A
            git commit -m "Address CI failures for learn plan consolidation"
            git push origin "$BRANCH_NAME"
            echo "Pushed CI fixes"
          else
            echo "No changes needed"
          fi

  rebase-if-needed:
    needs: [consolidate, implement, ci-address]
    if: needs.consolidate.outputs.has_plans == 'true' && needs.implement.result == 'success' && always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate required secrets
        env:
          ERK_PAT: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          if [ -z "$ERK_PAT" ]; then
            echo "::error title=Missing Secret::ERK_QUEUE_GH_PAT not configured"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
          fetch-depth: 0

      - uses: ./.github/actions/erk-remote-setup
        with:
          erk-pat: ${{ secrets.ERK_QUEUE_GH_PAT }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Check mergeable status
        id: mergeable
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          MERGEABLE=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.mergeable_state')
          echo "state=$MERGEABLE" >> $GITHUB_OUTPUT
          echo "Mergeable state: $MERGEABLE"

      - name: Rebase if conflicting
        if: steps.mergeable.outputs.state == 'dirty' || steps.mergeable.outputs.state == 'conflicting'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          SUBMITTED_BY: ${{ inputs.submitted_by }}
        run: |
          git fetch origin "$BRANCH_NAME"
          git checkout "$BRANCH_NAME"
          git config user.name "$SUBMITTED_BY"
          git config user.email "$SUBMITTED_BY@users.noreply.github.com"

          erk exec rebase-with-conflict-resolution \
            --target-branch "${{ needs.consolidate.outputs.base_branch }}" \
            --branch-name "$BRANCH_NAME" \
            --model "${{ inputs.model_name }}"
