name: pr-address
run-name: "pr-address:#${{ inputs.pr_number }}:${{ inputs.distinct_id }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address review comments"
        required: true
        type: string
      distinct_id:
        description: "Unique identifier for run discovery (base36)"
        required: true
        type: string
      model_name:
        description: "Claude model to use"
        required: false
        type: string
        default: "claude-sonnet-4-6"
concurrency:
  group: pr-address-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  address:
    if: vars.CLAUDE_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
          fetch-depth: 0

      - uses: ./.github/actions/erk-remote-setup
        with:
          erk-pat: ${{ secrets.ERK_QUEUE_GH_PAT }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Write dispatch metadata to plan
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PLAN_NUMBER: ${{ inputs.pr_number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          NODE_ID=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" --jq '.node_id')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          erk exec update-plan-header "$PLAN_NUMBER" \
            "last_dispatched_run_id=$RUN_ID" \
            "last_dispatched_node_id=$NODE_ID" \
            "last_dispatched_at=$TIMESTAMP"

      - name: Checkout PR branch
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          gh pr checkout "$PR_NUMBER"
          echo "Checked out PR #$PR_NUMBER"

      - name: Set plan ID from PR number
        id: plan_info
        run: |
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "plan_id=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT

      - name: Save pre-implementation HEAD
        id: pre_impl
        run: echo "head=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Address PR review comments
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MODEL_NAME: ${{ inputs.model_name }}
        run: |
          claude --print \
            --model "$MODEL_NAME" \
            --output-format stream-json \
            --dangerously-skip-permissions \
            --verbose \
            "/erk:pr-address --pr $PR_NUMBER"

      - name: Clean up plan staging dirs if present
        run: |
          # For plan-only PRs, .erk/impl-context/plan.md IS the PR content — skip cleanup
          if git ls-files --error-unmatch .erk/impl-context/plan.md >/dev/null 2>&1; then
            echo "Plan-only PR detected (.erk/impl-context/plan.md is tracked), skipping cleanup"
          elif [ -d .erk/impl-context/ ] && git ls-files --error-unmatch .erk/impl-context/ >/dev/null 2>&1; then
            git rm -rf .erk/impl-context/
            git commit -m "Remove plan staging dirs"
            echo "Cleaned up plan staging dirs"
          fi

      - name: Push changes
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
        run: |
          if [ -z "$(git log --oneline @{upstream}..HEAD 2>/dev/null)" ]; then
            echo "No changes to push"
          else
            git push
            echo "Changes pushed successfully"
          fi

      - name: Capture session ID
        id: session
        if: always()
        run: |
          if OUTPUT=$(erk exec capture-session-info --path "$GITHUB_WORKSPACE" 2>/dev/null); then
            eval "$OUTPUT"
            echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
            echo "session_file=$SESSION_FILE" >> "$GITHUB_OUTPUT"
            echo "Captured session ID: $SESSION_ID"
          else
            echo "No session found for: $GITHUB_WORKSPACE"
          fi

      - name: Push preprocessed session to planned-pr-context branch
        if: always() && steps.session.outputs.session_id && steps.plan_info.outputs.plan_id
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PLAN_ID: ${{ steps.plan_info.outputs.plan_id }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
          SESSION_FILE: ${{ steps.session.outputs.session_file }}
        run: |
          erk exec push-session \
            --session-file "$SESSION_FILE" \
            --session-id "$SESSION_ID" \
            --stage address \
            --source remote \
            --pr-number "$PLAN_ID"

      - name: Update plan header with remote impl info
        if: always() && steps.plan_info.outputs.plan_id
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.ERK_QUEUE_GH_PAT }}
          PLAN_ID: ${{ steps.plan_info.outputs.plan_id }}
          RUN_ID: ${{ github.run_id }}
          SESSION_ID: ${{ steps.session.outputs.session_id }}
          BRANCH_NAME: ${{ steps.plan_info.outputs.branch_name }}
          REPO: ${{ github.repository }}
        run: |
          NODE_ID=$(gh api "/repos/$REPO/actions/runs/$RUN_ID" --jq '.node_id')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          erk exec update-plan-header "$PLAN_ID" \
            "last_remote_impl_at=$TIMESTAMP" \
            "last_remote_impl_run_id=$RUN_ID" \
            "last_remote_impl_session_id=$SESSION_ID" \
            "branch_name=$BRANCH_NAME" \
            "last_dispatched_run_id=$RUN_ID" \
            "last_dispatched_node_id=$NODE_ID" \
            "last_dispatched_at=$TIMESTAMP"

      - name: Generate and post summary comment
        if: always()
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PRE_HEAD: ${{ steps.pre_impl.outputs.head }}
          MODEL_NAME: ${{ inputs.model_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          GH_TOKEN: ${{ github.token }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Get incremental diff and pipe to summary generator
          BODY=$(git diff "$PRE_HEAD"..HEAD | erk exec generate-pr-address-summary \
            --pr-number "$PR_NUMBER" \
            --pre-head "$PRE_HEAD" \
            --model-name "$MODEL_NAME" \
            --run-url "$RUN_URL" \
            --job-status "$JOB_STATUS")

          # Post or update comment using existing exec command
          erk exec post-or-update-pr-summary \
            --pr-number "$PR_NUMBER" \
            --marker "<!-- erk:pr-address-run -->" \
            --body "$BODY"
