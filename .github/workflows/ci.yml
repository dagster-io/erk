name: ci

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check-submission:
    if: github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'erk-plan-review')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for submission folder
        id: check
        uses: ./.github/actions/check-impl-context

  # === Style Checks (parallel) ===
  format:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Check Python formatting
        run: make format-check

  lint:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Run ruff linting
        run: make lint

  fix-formatting:
    needs: check-submission
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout PR branch (not detached HEAD) so we can push fixes
          ref: ${{ github.head_ref || github.ref }}
          # Use PAT so git push triggers a new CI run on the auto-committed HEAD
          token: ${{ secrets.ERK_QUEUE_GH_PAT }}
      - uses: ./.github/actions/setup-python-uv
      - uses: ./.github/actions/setup-prettier
      - name: Sync documentation
        run: make docs-fix
      - name: Fix Python formatting
        run: uv run ruff format
      - name: Fix markdown formatting
        run: prettier --write '**/*.md' --ignore-path .gitignore
      - name: Commit and push if changes
        id: commit
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # On push to master: fail instead of auto-committing
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "::error::Files need formatting or docs are out of sync"
            git diff --stat
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # On fork PRs: fail instead of auto-committing (can't push to fork)
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.event.pull_request.base.repo.full_name }}"
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::Formatting issues found (cannot auto-fix fork PRs)"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Auto-fix: commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.md' '*.py'
          git commit -m "Auto-fix formatting (docs-sync + ruff + Prettier)"
          git push
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "::notice::Auto-fixed formatting and pushed"

  docs-check:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - uses: ./.github/actions/setup-prettier
      - name: Check AGENTS.md standard compliance
        run: make md-check
      - name: Check agent documentation
        run: make docs-check

  # === Type/Test Checks (parallel) ===
  ty:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Run ty
        run: make ty

  unit-tests:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/setup-graphite
      - name: Run unit tests
        run: make test

  integration-tests:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - uses: ./.github/actions/setup-graphite
      - uses: ./.github/actions/setup-prettier
      - name: Run integration tests
        run: make test-integration

  erk-mcp-tests:
    needs: [check-submission, fix-formatting]
    if: github.event.pull_request.draft != true && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Run erk-mcp tests
        run: make test-erk-mcp

  # === CI Failure Summarization (Haiku) ===
  ci-summarize:
    needs:
      [
        format,
        lint,
        fix-formatting,
        docs-check,
        ty,
        unit-tests,
        integration-tests,
        erk-mcp-tests,
      ]
    if: |
      vars.CLAUDE_ENABLED != 'false' &&
      always() &&
      (github.event_name == 'pull_request') &&
      (github.event.pull_request.draft != true) &&
      !contains(github.event.pull_request.labels.*.name, 'erk-plan-review') &&
      (needs.format.result == 'failure' ||
       needs.lint.result == 'failure' ||
       needs.fix-formatting.result == 'failure' ||
       needs.docs-check.result == 'failure' ||
       needs.ty.result == 'failure' ||
       needs.unit-tests.result == 'failure' ||
       needs.integration-tests.result == 'failure' ||
       needs.erk-mcp-tests.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-uv
      - name: Install erk
        run: |
          if [ -d "./packages/erk-shared" ]; then
            uv tool install --from . --with-editable ./packages/erk-shared erk
          else
            uv tool install --from . --with erk-shared erk
          fi
      - uses: ./.github/actions/setup-claude-code
      - name: Summarize failures
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: erk exec ci-generate-summaries --run-id "${{ github.run_id }}" --pr-number "${{ github.event.pull_request.number }}"

  # === Code Reviews (downstream of fix-formatting) ===
  discover-reviews:
    needs: [check-submission, fix-formatting]
    if: vars.CLAUDE_ENABLED != 'false' && github.event.pull_request.draft != true && !contains(github.event.pull_request.labels.*.name, 'erk-plan-review') && needs.check-submission.outputs.skip == 'false' && needs.fix-formatting.outputs.pushed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_reviews: ${{ steps.discover.outputs.has_reviews }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check local review marker
        id: check_local_review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          MARKER="<!-- erk:local-review-passed:${HEAD_SHA} -->"
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --json body -q .body)
          if printf '%s' "$PR_BODY" | grep -qF "$MARKER"; then
            echo "Local review marker found for HEAD ${HEAD_SHA:0:8} - skipping CI reviews"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_local_review.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        if: steps.check_local_review.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Install erk
        if: steps.check_local_review.outputs.skip != 'true'
        run: uv tool install --from . --with ./packages/erk-shared erk

      - name: Discover matching reviews
        if: steps.check_local_review.outputs.skip != 'true'
        id: discover
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Run discovery and capture output
          OUTPUT=$(erk exec discover-reviews --pr-number ${{ github.event.pull_request.number }} --reviews-dir .erk/reviews)
          echo "Discovery output:"
          echo "$OUTPUT"

          # Check if discovery succeeded
          SUCCESS=$(echo "$OUTPUT" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Discovery failed"
            echo "$OUTPUT" | jq .
            exit 1
          fi

          # Extract matrix and check if there are any reviews
          MATRIX=$(echo "$OUTPUT" | jq -c '.matrix')
          REVIEW_COUNT=$(echo "$OUTPUT" | jq '.reviews | length')

          echo "Found $REVIEW_COUNT matching reviews"
          echo "Matrix: $MATRIX"

          # Set outputs
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$REVIEW_COUNT" -gt 0 ]; then
            echo "has_reviews=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reviews=false" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: discover-reviews
    if: needs.discover-reviews.outputs.has_reviews == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-reviews.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Claude Code
        uses: ./.github/actions/setup-claude-code

      - name: Install erk
        run: uv tool install --from . --with ./packages/erk-shared erk

      - name: Run ${{ matrix.name }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract review name from filename (remove .md extension)
          REVIEW_NAME="${{ matrix.filename }}"
          REVIEW_NAME="${REVIEW_NAME%.md}"

          echo "Running review: $REVIEW_NAME"
          erk exec run-review \
            --name "$REVIEW_NAME" \
            --pr-number ${{ github.event.pull_request.number }} \
            --reviews-dir .erk/reviews
